name: Release Agent Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # required for GCP workload identity federation

env:
  GO_VERSION: "1.24"
  AGENT_RELEASES_BUCKET: silkstrand-agent-releases

jobs:
  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd agent
          go build \
            -ldflags="-s -w -X main.version=$VERSION" \
            -o ../silkstrand-agent-${{ matrix.suffix }} \
            ./cmd/silkstrand-agent/

      - name: Generate checksum
        run: sha256sum silkstrand-agent-${{ matrix.suffix }} > silkstrand-agent-${{ matrix.suffix }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: |
            silkstrand-agent-${{ matrix.suffix }}
            silkstrand-agent-${{ matrix.suffix }}.sha256

  publish-release:
    name: Attach Agent Binaries to Release
    runs-on: ubuntu-latest
    needs: [build-agent]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          merge-multiple: true

      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Upload binaries to GCS (versioned + latest)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          gcloud storage cp silkstrand-agent-* gs://${AGENT_RELEASES_BUCKET}/${VERSION}/
          gcloud storage cp silkstrand-agent-* gs://${AGENT_RELEASES_BUCKET}/latest/
          # install.sh stays at the bucket root and isn't versioned — any
          # improvements apply to every install immediately.
          gcloud storage cp scripts/install-agent.sh gs://${AGENT_RELEASES_BUCKET}/install.sh
          gcloud storage objects update gs://${AGENT_RELEASES_BUCKET}/install.sh \
            --content-type=text/x-shellscript

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            silkstrand-agent-*
