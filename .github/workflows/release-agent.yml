name: Release Agent Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # required for GCP workload identity federation

env:
  GO_VERSION: "1.24"
  AGENT_RELEASES_BUCKET: silkstrand-agent-releases
  AGENT_IMAGE_REGISTRY: us-central1-docker.pkg.dev/silkstrand-prod/silkstrand

jobs:
  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd agent
          go build \
            -ldflags="-s -w -X main.version=$VERSION" \
            -o ../silkstrand-agent-${{ matrix.suffix }} \
            ./cmd/silkstrand-agent/

      - name: Generate checksum
        run: sha256sum silkstrand-agent-${{ matrix.suffix }} > silkstrand-agent-${{ matrix.suffix }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: |
            silkstrand-agent-${{ matrix.suffix }}
            silkstrand-agent-${{ matrix.suffix }}.sha256

  publish-release:
    name: Attach Agent Binaries to Release
    runs-on: ubuntu-latest
    needs: [build-agent]
    steps:
      # Checkout first — download-artifact puts files in the workspace and
      # actions/checkout wipes it, so ordering matters.
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          merge-multiple: true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Upload binaries to GCS (versioned + latest)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Versioned folder — immutable. Default 1h CDN cache is fine.
          gcloud storage cp silkstrand-agent-* gs://${AGENT_RELEASES_BUCKET}/${VERSION}/
          # latest/ is rewritten every release — disable caching so the
          # new binary is served immediately. Without this the public
          # edge serves stale binaries for up to 1h after a release.
          gcloud storage cp silkstrand-agent-* gs://${AGENT_RELEASES_BUCKET}/latest/ \
            --cache-control="no-cache, max-age=0"
          # install.sh is also rewritten every release — same treatment.
          gcloud storage cp scripts/install-agent.sh gs://${AGENT_RELEASES_BUCKET}/install.sh \
            --cache-control="no-cache, max-age=0"
          gcloud storage objects update gs://${AGENT_RELEASES_BUCKET}/install.sh \
            --content-type=text/x-shellscript

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            silkstrand-agent-*

  build-push-image:
    name: Build & Push Agent Container Image
    runs-on: ubuntu-latest
    needs: [build-agent]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push agent image
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          IMAGE_TAG="${{ env.AGENT_IMAGE_REGISTRY }}/agent:v${VERSION}"
          IMAGE_LATEST="${{ env.AGENT_IMAGE_REGISTRY }}/agent:latest"
          docker build --build-arg VERSION="v${VERSION}" \
            -t "${IMAGE_TAG}" -t "${IMAGE_LATEST}" \
            -f agent/Dockerfile agent/
          docker push "${IMAGE_TAG}"
          docker push "${IMAGE_LATEST}"
