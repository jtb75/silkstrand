name: Release Agent Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd agent
          go build \
            -ldflags="-s -w -X main.version=$VERSION" \
            -o ../silkstrand-agent-${{ matrix.suffix }} \
            ./cmd/silkstrand-agent/

      - name: Generate checksum
        run: sha256sum silkstrand-agent-${{ matrix.suffix }} > silkstrand-agent-${{ matrix.suffix }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: |
            silkstrand-agent-${{ matrix.suffix }}
            silkstrand-agent-${{ matrix.suffix }}.sha256

  publish-release:
    name: Attach Agent Binaries to Release
    runs-on: ubuntu-latest
    needs: [build-agent]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          merge-multiple: true

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            silkstrand-agent-*
