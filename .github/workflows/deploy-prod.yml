name: Deploy to Prod

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: read
  id-token: write

env:
  TERRAFORM_VERSION: "1.7"
  GAR_REGISTRY: us-central1-docker.pkg.dev/silkstrand-prod/silkstrand
  GCP_PROJECT: silkstrand-prod
  GCP_REGION: us-central1

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      sha: ${{ steps.tag.outputs.sha }}
      is_tag: ${{ steps.tag.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag info
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            TAG_SHA=$(git rev-list -n 1 "$GITHUB_REF")
          else
            # workflow_dispatch: use latest commit on main
            echo "version=manual-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            TAG_SHA=$(git rev-parse HEAD)
          fi
          SHORT_SHA=$(echo "$TAG_SHA" | cut -c1-7)
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  build-push-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [validate-tag]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          SHA=${{ needs.validate-tag.outputs.sha }}
          IMAGE="${{ env.GAR_REGISTRY }}/api:sha-${SHA}"
          docker build -t ${IMAGE} -t ${{ env.GAR_REGISTRY }}/api:latest -f api/Dockerfile api/
          docker push ${IMAGE}
          docker push ${{ env.GAR_REGISTRY }}/api:latest

  build-push-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: [validate-tag]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        if: hashFiles('web/Dockerfile') != ''
        run: |
          SHA=${{ needs.validate-tag.outputs.sha }}
          docker build -t ${{ env.GAR_REGISTRY }}/web:sha-${SHA} -t ${{ env.GAR_REGISTRY }}/web:latest -f web/Dockerfile web/
          docker push ${{ env.GAR_REGISTRY }}/web:sha-${SHA}
          docker push ${{ env.GAR_REGISTRY }}/web:latest

  # Deploy via Terraform — same pattern as stage.
  # Do NOT use gcloud run deploy — it creates v1 API revisions that conflict
  # with the Terraform-managed v2 services.
  deploy:
    name: Deploy to Prod (Terraform)
    runs-on: ubuntu-latest
    needs: [validate-tag, build-push-api, build-push-web]
    env:
      TF_WORKING_DIR: terraform/environments/prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Apply
        run: |
          SHA=${{ needs.validate-tag.outputs.sha }}
          terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve -lock-timeout=5m \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var="redis_url=${{ secrets.UPSTASH_REDIS_URL_PROD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET_PROD }}" \
            -var="internal_api_key=${{ secrets.INTERNAL_API_KEY_PROD }}" \
            -var="backoffice_jwt_secret=${{ secrets.BACKOFFICE_JWT_SECRET }}" \
            -var="backoffice_encryption_key=${{ secrets.BACKOFFICE_ENCRYPTION_KEY }}" \
            -var="image=${{ env.GAR_REGISTRY }}/api:sha-${SHA}"

  smoke-test:
    name: Smoke Test (Prod)
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Health check API
        continue-on-error: true
        run: |
          API_URL="https://api.silkstrand.io/readyz"
          echo "Checking: $API_URL"
          for i in 1 2 3 4 5 6; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")
            if [ "$status" = "200" ]; then
              echo "API readiness check passed"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 15s..."
            sleep 15
          done
          echo "::warning::API readiness check failed"
          exit 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [smoke-test, validate-tag]
    if: needs.validate-tag.outputs.is_tag == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            echo "First release" > release-notes.md
          else
            echo "## Changes since $PREV_TAG" > release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$GITHUB_REF_NAME" >> release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.validate-tag.outputs.version }}"
          body_path: release-notes.md
          generate_release_notes: false
