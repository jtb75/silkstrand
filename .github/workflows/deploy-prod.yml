name: Deploy to Prod

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read
  id-token: write

env:
  TERRAFORM_VERSION: "1.7"
  REGISTRY: ghcr.io
  GCP_PROJECT: silkstrand-prod
  GCP_REGION: us-central1

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag info
        id: tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Get the commit SHA this tag points to
          TAG_SHA=$(git rev-list -n 1 "$GITHUB_REF")
          SHORT_SHA=$(echo "$TAG_SHA" | cut -c1-7)
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify image exists in GHCR
        run: |
          echo "Verifying API image exists for sha-${{ steps.tag.outputs.sha }}"
          docker manifest inspect ${{ env.REGISTRY }}/${{ github.repository }}/api:sha-${{ steps.tag.outputs.sha }}

          echo "Verifying Web image exists for sha-${{ steps.tag.outputs.sha }}"
          docker manifest inspect ${{ env.REGISTRY }}/${{ github.repository }}/web:sha-${{ steps.tag.outputs.sha }}
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  terraform-apply:
    name: Terraform Apply (Prod)
    runs-on: ubuntu-latest
    needs: [validate-tag]
    env:
      TF_WORKING_DIR: terraform/environments/prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve -lock-timeout=5m \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var="redis_url=${{ secrets.UPSTASH_REDIS_URL_PROD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET_PROD }}"

  deploy-cloud-run:
    name: Deploy Cloud Run Services (Prod)
    runs-on: ubuntu-latest
    needs: [terraform-apply, validate-tag]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: silkstrand-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/api:sha-${{ needs.validate-tag.outputs.sha }}

      - name: Deploy Web to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: silkstrand-web
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/web:sha-${{ needs.validate-tag.outputs.sha }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-cloud-run, validate-tag]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            # First release, use all commits
            echo "First release" > release-notes.md
          else
            echo "## Changes since $PREV_TAG" > release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$GITHUB_REF_NAME" >> release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.validate-tag.outputs.version }}"
          body_path: release-notes.md
          generate_release_notes: false
