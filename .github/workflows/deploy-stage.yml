name: Deploy to Stage

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.7"
  REGISTRY: ghcr.io
  GCP_PROJECT: silkstrand-stage
  GCP_REGION: us-central1

jobs:
  build-push-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: api/
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-push-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/web
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: web/
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  terraform-apply:
    name: Terraform Apply (Stage)
    runs-on: ubuntu-latest
    needs: [build-push-api, build-push-web]
    env:
      TF_WORKING_DIR: terraform/environments/stage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve

  deploy-cloud-run:
    name: Deploy Cloud Run Services (Stage)
    runs-on: ubuntu-latest
    needs: [terraform-apply, build-push-api, build-push-web]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: silkstrand-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/api:sha-${{ github.sha }}

      - name: Deploy Web to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: silkstrand-web
          region: ${{ env.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ github.repository }}/web:sha-${{ github.sha }}

  smoke-test:
    name: Smoke Test (Stage)
    runs-on: ubuntu-latest
    needs: [deploy-cloud-run]
    steps:
      - name: Health check API
        run: |
          API_URL="${{ vars.STAGE_API_URL }}/healthz"
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")
            if [ "$status" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying..."
            sleep 10
          done
          echo "API health check failed"
          exit 1
