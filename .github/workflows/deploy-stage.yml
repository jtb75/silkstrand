name: Deploy to Stage

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.7"
  GAR_REGISTRY: us-central1-docker.pkg.dev/silkstrand-stage/silkstrand
  GCP_PROJECT: silkstrand-stage
  GCP_REGION: us-central1

jobs:
  # Detect which areas changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      terraform: ${{ steps.filter.outputs.terraform }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      backoffice-web: ${{ steps.filter.outputs.backoffice-web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'
            terraform:
              - 'terraform/**'
            backoffice:
              - 'backoffice/**'
              - '!backoffice/web/**'
            backoffice-web:
              - 'backoffice/web/**'

  build-push-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.GAR_REGISTRY }}/api:sha-${SHORT_SHA}"
          docker build -t ${IMAGE} -t ${{ env.GAR_REGISTRY }}/api:latest -f api/Dockerfile api/
          docker push ${IMAGE}
          docker push ${{ env.GAR_REGISTRY }}/api:latest
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

  build-push-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        if: hashFiles('web/Dockerfile') != ''
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build -t ${{ env.GAR_REGISTRY }}/web:sha-${SHORT_SHA} -t ${{ env.GAR_REGISTRY }}/web:latest -f web/Dockerfile web/
          docker push ${{ env.GAR_REGISTRY }}/web:sha-${SHORT_SHA}
          docker push ${{ env.GAR_REGISTRY }}/web:latest

  # Deploy via Terraform — this is the ONLY way to update Cloud Run services.
  # Do NOT use gcloud run deploy — it creates v1 API revisions that conflict
  # with the Terraform-managed v2 services.
  deploy:
    name: Deploy to Stage (Terraform)
    runs-on: ubuntu-latest
    needs: [changes, build-push-api, build-push-web]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.terraform == 'true') &&
      !contains(needs.*.result, 'failure')
    env:
      TF_WORKING_DIR: terraform/environments/stage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Determine API image
        id: image
        run: |
          if [ "${{ needs.build-push-api.outputs.image }}" != "" ]; then
            echo "api_image=${{ needs.build-push-api.outputs.image }}" >> "$GITHUB_OUTPUT"
          else
            echo "api_image=" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Apply
        run: |
          EXTRA_VARS=""
          if [ -n "${{ steps.image.outputs.api_image }}" ]; then
            EXTRA_VARS="-var=image=${{ steps.image.outputs.api_image }}"
          fi
          terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var="redis_url=${{ secrets.UPSTASH_REDIS_URL_STAGE }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET_STAGE }}" \
            ${EXTRA_VARS}

  smoke-test:
    name: Smoke Test (Stage)
    runs-on: ubuntu-latest
    needs: [changes, deploy]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.terraform == 'true') &&
      needs.deploy.result == 'success'
    steps:
      - name: Health check API
        continue-on-error: true
        run: |
          # Use the Terraform-managed v2 URL
          API_URL="https://api-stage.silkstrand.io/healthz"

          echo "Checking: $API_URL"
          for i in 1 2 3 4 5 6; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")
            if [ "$status" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 15s..."
            sleep 15
          done

          echo "::warning::API health check failed — service may need domain mapping reconfiguration"
          exit 1
