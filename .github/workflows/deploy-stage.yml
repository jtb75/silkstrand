name: Deploy to Stage

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.7"
  GAR_REGISTRY: us-central1-docker.pkg.dev/silkstrand-stage/silkstrand
  GCP_PROJECT: silkstrand-stage
  GCP_REGION: us-central1

jobs:
  # Detect which areas changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.set.outputs.api }}
      web: ${{ steps.set.outputs.web }}
      terraform: ${{ steps.set.outputs.terraform }}
      backoffice: ${{ steps.set.outputs.backoffice }}
      backoffice-web: ${{ steps.set.outputs.backoffice-web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        if: github.event_name == 'push'
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'
            terraform:
              - 'terraform/**'
            backoffice:
              - 'backoffice/**'
              - '!backoffice/web/**'
            backoffice-web:
              - 'backoffice/web/**'
      - name: Set outputs
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: deploy everything
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "terraform=true" >> "$GITHUB_OUTPUT"
            echo "backoffice=true" >> "$GITHUB_OUTPUT"
            echo "backoffice-web=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
            echo "terraform=${{ steps.filter.outputs.terraform }}" >> "$GITHUB_OUTPUT"
            echo "backoffice=${{ steps.filter.outputs.backoffice }}" >> "$GITHUB_OUTPUT"
            echo "backoffice-web=${{ steps.filter.outputs.backoffice-web }}" >> "$GITHUB_OUTPUT"
          fi

  build-push-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.GAR_REGISTRY }}/api:sha-${SHORT_SHA}"
          docker build -t ${IMAGE} -t ${{ env.GAR_REGISTRY }}/api:latest -f api/Dockerfile api/
          docker push ${IMAGE}
          docker push ${{ env.GAR_REGISTRY }}/api:latest
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

  build-push-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        if: hashFiles('web/Dockerfile') != ''
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}" \
            -t ${{ env.GAR_REGISTRY }}/web:sha-${SHORT_SHA} \
            -t ${{ env.GAR_REGISTRY }}/web:latest \
            -f web/Dockerfile web/
          docker push ${{ env.GAR_REGISTRY }}/web:sha-${SHORT_SHA}
          docker push ${{ env.GAR_REGISTRY }}/web:latest

  # Deploy via Terraform — this is the ONLY way to update Cloud Run services.
  # Do NOT use gcloud run deploy — it creates v1 API revisions that conflict
  # with the Terraform-managed v2 services.
  deploy:
    name: Deploy to Stage (Terraform)
    runs-on: ubuntu-latest
    needs: [changes, build-push-api, build-push-web]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.terraform == 'true') &&
      !contains(needs.*.result, 'failure')
    env:
      TF_WORKING_DIR: terraform/environments/stage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Determine API image
        id: image
        run: |
          if [ "${{ needs.build-push-api.outputs.image }}" != "" ]; then
            echo "api_image=${{ needs.build-push-api.outputs.image }}" >> "$GITHUB_OUTPUT"
          else
            # Fall back to :latest so terraform-only deploys don't revert
            # the service to the module default (gcr.io/cloudrun/hello).
            echo "api_image=${{ env.GAR_REGISTRY }}/api:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve -lock-timeout=5m \
            -var="image=${{ steps.image.outputs.api_image }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var="redis_url=${{ secrets.UPSTASH_REDIS_URL_STAGE }}" \
            -var="jwt_secret=${{ secrets.TENANT_JWT_SECRET }}" \
            -var="internal_api_key=${{ secrets.INTERNAL_API_KEY_STAGE }}" \
            -var="credential_encryption_key=${{ secrets.CREDENTIAL_ENCRYPTION_KEY_STAGE }}" \
            -var="tenant_web_url=https://silkstrand-web-baglom43cq-uc.a.run.app"

  smoke-test:
    name: Smoke Test (Stage)
    runs-on: ubuntu-latest
    needs: [changes, deploy]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.terraform == 'true') &&
      needs.deploy.result == 'success'
    steps:
      - name: Health check API
        continue-on-error: true
        run: |
          # /readyz is reachable externally; /healthz is intercepted by Cloud Run's probe routing.
          API_URL="https://api-stage.silkstrand.io/readyz"

          echo "Checking: $API_URL"
          for i in 1 2 3 4 5 6; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")
            if [ "$status" = "200" ]; then
              echo "API readiness check passed"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 15s..."
            sleep 15
          done

          echo "::warning::API readiness check failed"
          exit 1
