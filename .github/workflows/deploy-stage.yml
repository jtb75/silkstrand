name: Deploy to Stage

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.7"
  GAR_REGISTRY: us-central1-docker.pkg.dev/silkstrand-stage/silkstrand
  GCP_PROJECT: silkstrand-stage
  GCP_REGION: us-central1

jobs:
  # Detect which areas changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      terraform: ${{ steps.filter.outputs.terraform }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      backoffice-web: ${{ steps.filter.outputs.backoffice-web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'
            terraform:
              - 'terraform/**'
            backoffice:
              - 'backoffice/**'
              - '!backoffice/web/**'
            backoffice-web:
              - 'backoffice/web/**'

  build-push-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build -t ${{ env.GAR_REGISTRY }}/api:sha-${SHORT_SHA} -t ${{ env.GAR_REGISTRY }}/api:latest -f api/Dockerfile api/
          docker push ${{ env.GAR_REGISTRY }}/api:sha-${SHORT_SHA}
          docker push ${{ env.GAR_REGISTRY }}/api:latest

  build-push-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push
        if: hashFiles('web/Dockerfile') != ''
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build -t ${{ env.GAR_REGISTRY }}/web:sha-${SHORT_SHA} -t ${{ env.GAR_REGISTRY }}/web:latest -f web/Dockerfile web/
          docker push ${{ env.GAR_REGISTRY }}/web:sha-${SHORT_SHA}
          docker push ${{ env.GAR_REGISTRY }}/web:latest

  terraform-apply:
    name: Terraform Apply (Stage)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.terraform == 'true'
    env:
      TF_WORKING_DIR: terraform/environments/stage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var="redis_url=${{ secrets.UPSTASH_REDIS_URL_STAGE }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET_STAGE }}"

  deploy-cloud-run:
    name: Deploy Cloud Run Services (Stage)
    runs-on: ubuntu-latest
    needs: [changes, build-push-api, build-push-web]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true') &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        if: needs.changes.outputs.api == 'true'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          gcloud run deploy silkstrand-api \
            --project=${{ env.GCP_PROJECT }} \
            --region=${{ env.GCP_REGION }} \
            --image=${{ env.GAR_REGISTRY }}/api:sha-${SHORT_SHA} \
            --quiet

  smoke-test:
    name: Smoke Test (Stage)
    runs-on: ubuntu-latest
    needs: [changes, deploy-cloud-run]
    if: |
      always() &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true') &&
      needs.deploy-cloud-run.result == 'success'
    steps:
      - name: Health check API
        run: |
          CUSTOM_URL="https://api-stage.silkstrand.io/healthz"
          DIRECT_URL="https://silkstrand-api-uy4v4rttgq-uc.a.run.app/healthz"

          # Try custom domain first
          echo "Trying custom domain: $CUSTOM_URL"
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$CUSTOM_URL")
            if [ "$status" = "200" ]; then
              echo "API health check passed (custom domain)"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying..."
            sleep 10
          done

          # Fall back to direct Cloud Run URL
          echo "Custom domain unreachable, falling back to direct URL: $DIRECT_URL"
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$DIRECT_URL")
            if [ "$status" = "200" ]; then
              echo "API health check passed (direct Cloud Run URL)"
              exit 0
            fi
            echo "Fallback attempt $i: got $status, retrying..."
            sleep 10
          done

          echo "API health check failed on both custom domain and direct URL"
          exit 1

