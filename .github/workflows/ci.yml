name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  TERRAFORM_VERSION: "1.7"

jobs:
  # Detect which areas of the codebase changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      terraform: ${{ steps.filter.outputs.terraform }}
      docker: ${{ steps.filter.outputs.docker }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      backoffice-web: ${{ steps.filter.outputs.backoffice-web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - 'agent/**'
              - 'api/**'
            web:
              - 'web/**'
            terraform:
              - 'terraform/**'
            docker:
              - 'agent/**'
              - 'api/**'
              - 'web/**'
              - 'backoffice/**'
              - '**/Dockerfile'
            backoffice:
              - 'backoffice/**'
              - '!backoffice/web/**'
            backoffice-web:
              - 'backoffice/web/**'

  go-lint-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint agent
        if: hashFiles('agent/go.mod') != ''
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: agent

      - name: Test agent
        if: hashFiles('agent/go.mod') != ''
        run: cd agent && go test ./... -v -race -coverprofile=coverage.out

      - name: Lint API
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: api

      - name: Test API
        run: cd api && go test ./... -v -race -coverprofile=coverage.out

  web-lint-test:
    name: Web Lint & Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint
        run: cd web && npm run lint

      - name: Type check
        run: cd web && npm run typecheck

      - name: Test
        run: cd web && npm run test

  backoffice-go:
    name: Backoffice Go Lint & Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backoffice == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backoffice

      - name: Test
        run: cd backoffice && go test ./... -v -race

  backoffice-web:
    name: Backoffice Web Lint & Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backoffice-web == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: cd backoffice/web && npm ci

      - name: Lint
        run: cd backoffice/web && npm run lint

      - name: Type check
        run: cd backoffice/web && npm run typecheck

      - name: Test
        run: cd backoffice/web && npm run test

  build-images:
    name: Build Container Images (verify)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.docker == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t silkstrand-api:test -f api/Dockerfile api/

      - name: Build Web image
        if: hashFiles('web/Dockerfile') != ''
        run: docker build -t silkstrand-web:test -f web/Dockerfile web/

      - name: Build Backoffice API image
        if: needs.changes.outputs.backoffice == 'true'
        run: docker build -t backoffice-api:verify -f backoffice/Dockerfile backoffice/

      - name: Build Backoffice Web image
        if: needs.changes.outputs.backoffice-web == 'true'
        run: docker build -t backoffice-web:verify -f backoffice/web/Dockerfile backoffice/web/

  terraform-plan-stage:
    name: Terraform Plan (Stage)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.terraform == 'true'
    env:
      TF_WORKING_DIR: terraform/environments/stage
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STAGE }}
          service_account: ${{ vars.WIF_SA_STAGE }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} plan -no-color -lock-timeout=5m -input=false \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var="redis_url=${{ secrets.UPSTASH_REDIS_URL_STAGE }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET_STAGE }}" \
            -var="internal_api_key=${{ secrets.INTERNAL_API_KEY_STAGE }}" \
            -var="credential_encryption_key=${{ secrets.CREDENTIAL_ENCRYPTION_KEY_STAGE }}" \
            -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const body = `### Terraform Plan — Stage (\`silkstrand-stage\`)

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            **Result:** ${{ steps.plan.outcome == 'success' && '✅ Plan succeeded' || '❌ Plan failed' }}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  terraform-plan-prod:
    name: Terraform Plan (Prod)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.terraform == 'true'
    env:
      TF_WORKING_DIR: terraform/environments/prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_PROD }}
          service_account: ${{ vars.WIF_SA_PROD }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} plan -no-color -lock-timeout=5m -input=false \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var="redis_url=${{ secrets.UPSTASH_REDIS_URL_PROD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET_PROD }}" \
            -var="internal_api_key=${{ secrets.INTERNAL_API_KEY_PROD }}" \
            -var="credential_encryption_key=${{ secrets.CREDENTIAL_ENCRYPTION_KEY_PROD }}" \
            -var="backoffice_jwt_secret=${{ secrets.BACKOFFICE_JWT_SECRET }}" \
            -var="backoffice_encryption_key=${{ secrets.BACKOFFICE_ENCRYPTION_KEY }}" \
            -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const body = `### Terraform Plan — Prod (\`silkstrand-prod\`)

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`

            </details>

            **Result:** ${{ steps.plan.outcome == 'success' && '✅ Plan succeeded' || '❌ Plan failed' }}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
