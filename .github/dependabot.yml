# Dependabot keeps our deps fresh — important for a security product.
# Without this config, GitHub fires per-dep PRs whenever anything updates,
# which buries human PRs. The settings below:
#
#   - schedule weekly (Monday) — one batch per week, predictable triage
#   - group patch + minor version updates per ecosystem into single PRs
#   - leave major version updates ungrouped (they break things; review
#     each on its own merits)
#   - cap open PRs at 5 per ecosystem
#
# Security advisories (Dependabot security updates) bypass the schedule
# and grouping — they ship as individual PRs the moment a CVE drops.
# That's the whole point.

version: 2
updates:
  # ─── Go modules ───
  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-deps:
        applies-to: version-updates
        update-types: [patch, minor]

  - package-ecosystem: gomod
    directory: /agent
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-deps:
        applies-to: version-updates
        update-types: [patch, minor]

  - package-ecosystem: gomod
    directory: /backoffice
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-deps:
        applies-to: version-updates
        update-types: [patch, minor]

  # ─── npm ───
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        applies-to: version-updates
        update-types: [patch, minor]

  - package-ecosystem: npm
    directory: /backoffice/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        applies-to: version-updates
        update-types: [patch, minor]

  # ─── GitHub Actions versions ───
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        applies-to: version-updates
        update-types: [patch, minor]
