services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: silkstrand
      POSTGRES_USER: silkstrand
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkstrand"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-backoffice:
    image: postgres:16-alpine
    ports:
      - "15433:5432"
    environment:
      POSTGRES_DB: silkstrand_backoffice
      POSTGRES_USER: silkstrand
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata-backoffice:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkstrand"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://silkstrand:localdev@postgres:5432/silkstrand?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      INTERNAL_API_KEY: dev-internal-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backoffice-api:
    build:
      context: ./backoffice
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://silkstrand:localdev@postgres-backoffice:5432/silkstrand_backoffice?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres-backoffice:
        condition: service_healthy

  web:
    build:
      context: ./web
    ports:
      - "3000:80"
    depends_on:
      - api

  backoffice-web:
    build:
      context: ./backoffice/web
    ports:
      - "3001:80"
    depends_on:
      - backoffice-api

volumes:
  pgdata:
  pgdata-backoffice:
