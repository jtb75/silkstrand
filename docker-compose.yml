services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: silkstrand
      POSTGRES_USER: silkstrand
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkstrand"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mssql:
    # SQL Server 2022 Developer edition — free for non-production use.
    # On Apple Silicon this runs under Rosetta; if perf becomes an issue,
    # swap to mcr.microsoft.com/azure-sql-edge (native ARM).
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    ports:
      - "11433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "SilkstrandLocal1!"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  mongodb:
    # MongoDB 8 for local compliance-bundle development.
    image: mongo:8
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: silkstrand
      MONGO_INITDB_ROOT_PASSWORD: MongoLocal1!
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--username", "silkstrand", "--password", "MongoLocal1!", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  postgres-backoffice:
    image: postgres:16-alpine
    ports:
      - "15433:5432"
    environment:
      POSTGRES_DB: silkstrand_backoffice
      POSTGRES_USER: silkstrand
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata-backoffice:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkstrand"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://silkstrand:localdev@postgres:5432/silkstrand?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      INTERNAL_API_KEY: dev-internal-key
      BUNDLE_CONTROLS_DIR: /app/controls
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backoffice-api:
    build:
      context: ./backoffice
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://silkstrand:localdev@postgres-backoffice:5432/silkstrand_backoffice?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres-backoffice:
        condition: service_healthy

  web:
    build:
      context: ./web
    ports:
      - "3000:80"
    depends_on:
      - api

  backoffice-web:
    build:
      context: ./backoffice/web
    ports:
      - "3001:80"
    depends_on:
      - backoffice-api

volumes:
  pgdata:
  pgdata-backoffice:
  mssql-data:
  mongo-data:
