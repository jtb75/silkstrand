id: cis-mongodb-8
name: CIS MongoDB 8 Benchmark
version: 2.0.4
framework: cis-mongodb-8
engine: mongodb
controls:
  - mongo-auth-configured
  - mongo-localhost-auth-bypass
  - mongo-sharded-cluster-auth
  - mongo-legacy-tls-disabled
  - mongo-weak-protocols-disabled
  - mongo-tls-transport-encryption
  - mongo-fips-enabled
  - mongo-system-activity-audited
  - mongo-logging-captures-info
  - mongo-log-append
  - mongo-non-default-port
