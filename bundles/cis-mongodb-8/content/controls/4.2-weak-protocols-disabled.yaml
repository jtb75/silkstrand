id: "4.2"
title: "Ensure Weak Protocols are Disabled"
section: "Data Encryption"
assessment: automated
profile:
  - "Level 1- MongoDB"
severity: MEDIUM

description: >
  Servers can be configured to disable specific TLS/SSL protocol
  versions which may be vulnerable to exploitation and/or lack features
  which improve the level of security as provided by newer versions of
  the protocol.

rationale: >
  The TLSv1.0 protocol is vulnerable to the BEAST attack when used in
  CBC mode (October 2011). Unfortunately, the TLSv1.0 uses CBC modes for
  all of the block mode ciphers, which only leaves the RC4 streaming
  cipher which is also weak and is not recommended. Therefore, it is
  recommended that the TLSv1.0 protocol be disabled. The TLSv1.1
  protocol does not support Authenticated Encryption with Associated
  Data (AEAD) which is designed to simultaneously provide
  confidentiality, integrity, and authenticity.

  The NIST SP 800-52r2 guidelines for TLS configuration require that
  TLS 1.2 is configured with FIPS-based cipher suites be supported by
  all government TLS servers and clients and requires support of TLS
  1.3 by January 1, 2024. A September 2018 IETF draft also depreciates
  the usage of TLSv1.0 and TLSv1.1 as shown in the references.

impact: >
  If an attempt to connect using a disabled protocol is made the
  connection attempt will fail and may have unanticipated impact on
  clients attempting to establish the connection.

check:
  type: mongodb_command
  database: admin
  command:
    getCmdLineOpts: 1
  assertions:
    - field: parsed.net.tls.disabledProtocols
      op: pattern_match
      value: "TLS1_0"
    - field: parsed.net.tls.disabledProtocols
      op: pattern_match
      value: "TLS1_1"

remediation: |
  For mongod ("Primary daemon process for the MongoDB system")
  In the configuration file /etc/mongod.conf, set the disabledProtocols
  option to include TLS1_0,TLS1_1:

      net:
        ssl:
          mode: requireSSL
          PEMKeyFile: /etc/ssl/mongodb.pem
          CAFile: /etc/ssl/caToValidateClientCertificates.pem
          disabledProtocols: TLS1_0,TLS1_1

  And restart mongodb instance with:
      mongod --config /etc/mongod.conf
  Or:
      mongod --sslDisabledProtocols `TLS1_0,TLS1_1

default_value: "TLS1_0 if TLS 1.1+ is available on the system."

references:
  - https://www.mongodb.com/docs/v7.0/reference/configuration-options/#mongodb-setting-net.ssl.disabledProtocols

framework_mappings:
  cis_controls_v8:
    - id: "3.10"
      title: "Encrypt Sensitive Data in Transit"
  cis_controls_v7:
    - id: "14.4"
      title: "Encrypt All Sensitive Information in Transit"
