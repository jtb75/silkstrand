id: "3.1.2"
title: "Ensure the log destinations are set correctly"
section: "Logging And Auditing"
assessment: automated
profile:
  - "Level 1 - PostgreSQL"
severity: MEDIUM

description: >
  PostgreSQL supports several methods for logging server messages,
  including stderr, csvlog, syslog, and jsonlog. On Windows, eventlog
  is also supported. One or more of these destinations should be set
  for server log output.

rationale: >
  If log_destination is not set, then any log messages generated by
  the core PostgreSQL processes will be lost.

check:
  # PG exposes GUCs via SHOW <name>, which pg8000 returns as a single
  # row with one column. sql_configuration with an assertion on the
  # setting-named column validates the value.
  type: sql_configuration
  query: "SHOW log_destination;"
  existence: at_least_one_row
  aggregation: all_rows_match
  assertions:
    - field: log_destination
      op: pattern_match
      value: "(stderr|csvlog|syslog|jsonlog|eventlog)"

remediation: |
  Execute the following SQL statements to remediate this setting (in this
  example, setting the log destination to csvlog):

  ALTER SYSTEM SET log_destination = 'csvlog';
  SELECT pg_reload_conf();

  If more than one log destination is to be used, set this parameter to a
  list of desired log destinations separated by commas (e.g. 'csvlog, stderr').

default_value: "stderr"

references:
  - https://www.postgresql.org/docs/current/runtime-config-logging.html

framework_mappings:
  cis_controls_v8:
    - id: "8.2"
      title: "Collect Audit Logs"
    - id: "8.5"
      title: "Collect Detailed Audit Logs"
  cis_controls_v7:
    - id: "6.2"
      title: "Activate audit logging"
    - id: "6.3"
      title: "Enable Detailed Logging"
