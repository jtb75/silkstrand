id: "3.1.20"
title: "Ensure 'log_connections' is enabled"
section: "Logging And Auditing"
assessment: automated
profile:
  - "Level 1 - PostgreSQL"
severity: MEDIUM

description: >
  Enabling the log_connections setting causes each attempted
  connection to the server to be logged, as well as successful
  completion of client authentication. This parameter cannot be
  changed after the session start.

rationale: >
  PostgreSQL does not maintain an internal record of attempted
  connections to the database for later auditing. It is only by
  enabling the logging of these attempts that one can determine if
  unexpected attempts are being made. Note that enabling this without
  also enabling log_disconnections provides little value. Generally,
  you would enable/disable the pair together.

check:
  type: sql_configuration
  query: "SHOW log_connections;"
  assertions:
    - field: log_connections
      op: equals
      value: "on"

remediation: |
  ALTER SYSTEM SET log_connections = 'on';
  SELECT pg_reload_conf();

default_value: "off"

references:
  - https://www.postgresql.org/docs/current/static/runtime-config-logging.html

framework_mappings:
  cis_controls_v8:
    - id: "8.5"
      title: "Collect Detailed Audit Logs"
  cis_controls_v7:
    - id: "6.3"
      title: "Enable Detailed Logging"
