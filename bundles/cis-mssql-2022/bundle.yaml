id: cis-mssql-2022
name: CIS Microsoft SQL Server 2022 Benchmark
version: 2.0.4
framework: cis-mssql-2022
engine: mssql
controls:
  - mssql-ad-hoc-distributed-queries
  - mssql-clr-enabled
  - mssql-cross-db-ownership-chaining
  - mssql-database-mail-xps
  - mssql-ole-automation-procedures
  - mssql-remote-access
  - mssql-remote-admin-connections
  - mssql-scan-for-startup-procs
  - mssql-trustworthy-off
  - mssql-non-standard-port
  - mssql-hide-instance
  - mssql-sa-disabled
  - mssql-sa-renamed
  - mssql-auto-close-off
  - mssql-no-sa-login-name
  - mssql-clr-strict-security
  - mssql-server-auth-windows
  - mssql-guest-connect-revoked
  - mssql-orphaned-users
  - mssql-sql-auth-contained-dbs
  - mssql-public-role-permissions
  - mssql-no-builtin-groups
  - mssql-no-local-windows-groups
  - mssql-msdb-public-agent-proxies
  - mssql-no-admin-role-msdb
  - mssql-check-expiration-sysadmin
  - mssql-check-policy-all-logins
  - mssql-max-error-log-files
  - mssql-default-trace-enabled
  - mssql-audit-logins
  - mssql-symmetric-key-aes128
  - mssql-asymmetric-key-2048
  - mssql-backup-encryption
  - mssql-network-encryption
  - mssql-tde
