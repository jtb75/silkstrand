id: "2.8"
title: "Ensure 'Scan For Startup Procs' Server Configuration Option is set to '0'"
section: "Surface Area Reduction"
assessment: automated
profile:
  - "Level 1 - Database Engine"
severity: MEDIUM

description: >
  The scan for startup procs option, if enabled, causes SQL Server to
  scan for and automatically run all stored procedures that are set to
  execute upon service startup.

rationale: >
  Enforcing this control reduces the threat of an entity leveraging these
  facilities for malicious purposes.

impact: >
  Setting Scan for Startup Procedures to 0 will prevent certain audit
  traces and other commonly used monitoring stored procedures from
  re-starting on start up. Additionally, replication requires this
  setting to be enabled (1) and will automatically change this setting
  if needed.

check:
  type: sql_configuration
  query: |
    SELECT name,
           CAST(value as int) as value_configured,
           CAST(value_in_use as int) as value_in_use
    FROM sys.configurations
    WHERE name = 'scan for startup procs';
  existence: at_least_one_row
  aggregation: all_rows_match
  assertions:
    - field: value_configured
      op: equals
      value: 0
    - field: value_in_use
      op: equals
      value: 0

remediation: |
  EXECUTE sp_configure 'show advanced options', 1;
  RECONFIGURE;
  EXECUTE sp_configure 'scan for startup procs', 0;
  RECONFIGURE;
  GO
  EXECUTE sp_configure 'show advanced options', 0;
  RECONFIGURE;
  -- Restart the Database Engine.

default_value: "0 (disabled)"

references:
  - https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/configure-the-scan-for-startup-procs-server-configuration-option
