id: "4.2"
title: "Ensure 'CHECK_EXPIRATION' Option is set to 'ON' for All SQL Authenticated Logins Within the Sysadmin Role"
section: "Password Policies"
assessment: automated
profile:
  - "Level 1 - Database Engine"
  - "Level 1 - AWS RDS"
severity: HIGH

description: >
  Applies the same password expiration policy used in Windows to passwords
  used inside SQL Server.

rationale: >
  Ensuring SQL logins comply with the secure password policy applied by
  the Windows Server Benchmark will ensure the passwords for SQL logins
  with sysadmin privileges are changed on a frequent basis to help prevent
  compromise via a brute force attack. CONTROL SERVER is an equivalent
  permission to sysadmin and logins with that permission should also be
  required to have expiring passwords.

impact: |
  This is a mitigating recommendation for systems which cannot follow the
  recommendation to use only Windows Authenticated logins.

  Regarding limiting this rule to only logins with sysadmin and CONTROL
  SERVER privileges, there are too many cases of applications that run
  with less than sysadmin level privileges that have hard-coded passwords
  or effectively hard-coded passwords (whatever is set the first time is
  nearly impossible to change). There are several line-of-business
  applications that are considered best of breed which have this failing.

  Also, keep in mind that the password policy is taken from the computer's
  local policy, which is taken from the Default Domain Policy setting.
  Many organizations have a different password policy regarding the
  service accounts. These are handled in AD by setting the account's
  password to not expire and having some other process track when the
  password needs to be changed. With this second control in place, this is
  perfectly acceptable from an audit perspective. If you treat a SQL
  Server login as a service account, then you have to do the same. This
  ensures that the password change happens during a communicated downtime
  window and not arbitrarily.

check:
  # No rows should be returned. On AWS RDS instances only returning the
  # account `rdsa` is a pass — the rdsa account created by AWS RDS cannot
  # be altered (it has the sysadmin role but its password cannot be
  # changed to allow it to expire). That exception is not encoded here;
  # operators running on AWS RDS should filter or accept the rdsa finding.
  type: sql_no_rows_match
  query: |
    SELECT l.[name], 'sysadmin membership' AS 'Access_Method'
    FROM sys.sql_logins AS l
    WHERE IS_SRVROLEMEMBER('sysadmin',name) = 1
    AND l.is_expiration_checked <> 1
    UNION ALL
    SELECT l.[name], 'CONTROL SERVER' AS 'Access_Method'
    FROM sys.sql_logins AS l
    JOIN sys.server_permissions AS p
    ON l.principal_id = p.grantee_principal_id
    WHERE p.type = 'CL' AND p.state IN ('G', 'W')
    AND l.is_expiration_checked <> 1;

remediation: |
  For each <login_name> found by the Audit Procedure, execute the
  following T-SQL statement:

  ALTER LOGIN [<login_name>] WITH CHECK_EXPIRATION = ON;

default_value: |
  CHECK_EXPIRATION is ON by default when using SSMS to create a SQL
  authenticated login.

  CHECK_EXPIRATION is OFF by default when using T-SQL CREATE LOGIN syntax
  without specifying the CHECK_EXPIRATION option.

references:
  - https://learn.microsoft.com/en-us/sql/relational-databases/security/password-policy

framework_mappings:
  cis_controls_v8:
    - id: "5.3"
      title: "Disable Dormant Accounts"
  cis_controls_v7:
    - id: "16.10"
      title: "Ensure All Accounts Have An Expiration Date"
