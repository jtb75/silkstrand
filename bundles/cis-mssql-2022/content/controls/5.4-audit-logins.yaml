id: "5.4"
title: "Ensure 'SQL Server Audit' is set to capture both 'failed' and 'successful logins'"
section: "Auditing and Logging"
assessment: automated
profile:
  - "Level 1 - Database Engine"
  - "Level 1 - AWS RDS"
severity: HIGH

description: >
  SQL Server Audit is capable of capturing both failed and successful
  logins and writing them to one of three places: the application event
  log, the security event log, or the file system. We will use it to
  capture any login attempt to SQL Server, as well as any attempts to
  change audit policy, changes in privileged role memberships and
  changes to server settings. This will also serve to be a second
  source to record failed login attempts.

rationale: >
  By utilizing Audit instead of the traditional setting under the
  Security tab to capture successful logins, we reduce the noise in the
  ERRORLOG. This keeps it smaller and easier to read for DBAs who are
  attempting to troubleshoot issues with the SQL Server. Also, the
  Audit object can write to the security event log, though this
  requires operating system configuration. This gives an additional
  option for where to store login events, especially in conjunction
  with an SIEM.

impact: >
  With the previous recommendation, only failed logins are captured. If
  the Audit object is not implemented with the appropriate setting, SQL
  Server will not capture successful logins, which might prove of use
  for forensics.

check:
  # Query lists any Audit / Audit Specification rows matching the CIS
  # required action groups that are NOT compliant — i.e. audit or
  # specification disabled, or audited_result missing success/failure.
  # PASS iff no such non-compliant rows exist AND at least one
  # enabled audit covers FAILED_LOGIN_GROUP and SUCCESSFUL_LOGIN_GROUP.
  # We use sql_no_rows_match with an inverted query: any row returned
  # indicates a gap (either a required group is missing from any
  # enabled audit, or an existing matching row is disabled / missing
  # success+failure).
  type: sql_no_rows_match
  query: |
    WITH required_groups AS (
      SELECT 'FAILED_LOGIN_GROUP' AS action_name
      UNION ALL SELECT 'SUCCESSFUL_LOGIN_GROUP'
    ),
    matching AS (
      SELECT
        SAD.audit_action_name,
        S.is_state_enabled AS audit_enabled,
        SA.is_state_enabled AS spec_enabled,
        SAD.audited_result
      FROM sys.server_audit_specification_details AS SAD
        JOIN sys.server_audit_specifications AS SA
          ON SAD.server_specification_id = SA.server_specification_id
        JOIN sys.server_audits AS S
          ON SA.audit_guid = S.audit_guid
    )
    -- Gap 1: a required group has no enabled audit+spec row that
    -- captures both success and failure.
    SELECT rg.action_name AS missing_or_noncompliant
    FROM required_groups rg
    WHERE NOT EXISTS (
      SELECT 1 FROM matching m
      WHERE m.audit_action_name = rg.action_name
        AND m.audit_enabled = 1
        AND m.spec_enabled = 1
        AND m.audited_result LIKE '%SUCCESS%'
        AND m.audited_result LIKE '%FAILURE%'
    );

remediation: |
  For AWS RDS, refer to the AWS documentation for configuring SQL
  Server Audit. Otherwise execute:

  CREATE SERVER AUDIT TrackLogins
  TO APPLICATION_LOG;
  GO
  CREATE SERVER AUDIT SPECIFICATION TrackAllLogins
  FOR SERVER AUDIT TrackLogins
    ADD (FAILED_LOGIN_GROUP),
    ADD (SUCCESSFUL_LOGIN_GROUP),
    ADD (AUDIT_CHANGE_GROUP),
    ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),
    ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP),
    ADD (SERVER_OPERATION_GROUP),
    ADD (SUCCESSFUL_DATABASE_AUTHENTICATION_GROUP),
    ADD (FAILED_DATABASE_AUTHENTICATION_GROUP)
  WITH (STATE = ON);
  GO
  ALTER SERVER AUDIT TrackLogins
  WITH (STATE = ON);
  GO

default_value: "By default, there are no audit object tracking login events."

references:
  - https://learn.microsoft.com/en-us/sql/relational-databases/security/auditing/create-a-server-audit-and-server-audit-specification

