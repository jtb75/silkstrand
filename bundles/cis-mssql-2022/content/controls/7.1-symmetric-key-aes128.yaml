id: "7.1"
title: "Ensure 'Symmetric Key encryption algorithm' is set to 'AES_128' or higher in non-system databases"
section: "Encryption"
assessment: automated
profile:
  - "Level 1 - Database Engine"
  - "Level 1 - AWS RDS"
severity: HIGH

description: >
  Per the Microsoft Best Practices, only the SQL Server AES algorithm
  options, AES_128, AES_192, and AES_256, should be used for a symmetric
  key encryption algorithm.

rationale: >
  The following algorithms (as referred to by SQL Server) are considered
  weak or deprecated and should no longer be used in SQL Server: DES,
  DESX, RC2, RC4, RC4_128.

  Many organizations may accept the Triple DES algorithms (TDEA) which
  use keying options 1 (3 key aka 3TDEA) or keying option 2 (2 key aka
  2TDEA). In SQL Server, these are referred to as TRIPLE_DES_3KEY and
  TRIPLE_DES respectively. Additionally, the SQL Server algorithm named
  DESX is actually the same implementation as the TRIPLE_DES_3KEY
  option. However, using the DESX identifier as the algorithm type has
  been deprecated and its usage is now discouraged.

impact: >
  Eliminates use of weak and deprecated algorithms which may put a
  system at higher risk of an attacker breaking the key.

  Encrypted data cannot be compressed, but compressed data can be
  encrypted. If you use compression, you should compress data before
  encrypting it.

check:
  # Iterates every user database; PASS iff no database has symmetric
  # keys using a non-AES algorithm.
  type: sql_no_rows_match_per_database
  query: |
    SELECT db_name() AS Database_Name, name AS Key_Name
    FROM sys.symmetric_keys
    WHERE algorithm_desc NOT IN ('AES_128','AES_192','AES_256')
    AND db_id() > 4;

remediation: |
  Refer to Microsoft SQL Server Books Online ALTER SYMMETRIC KEY entry:
  https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-transact-sql

default_value: "none"

references:
  - https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-transact-sql
  - https://learn.microsoft.com/en-US/sql/relational-databases/security/encryption/choose-an-encryption-algorithm

framework_mappings:
