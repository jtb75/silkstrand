id: "7.2"
title: "Ensure Asymmetric Key Size is set to 'greater than or equal to 2048' in non-system databases"
section: "Encryption"
assessment: automated
profile:
  - "Level 1 - Database Engine"
  - "Level 1 - AWS RDS"
severity: HIGH

description: >
  Microsoft Best Practices recommend to use at least a 2048-bit
  encryption algorithm for asymmetric keys.

rationale: >
  The RSA_2048 encryption algorithm for asymmetric keys in SQL Server
  is the highest bit-level provided and therefore the most secure
  available choice (other choices are RSA_512 and RSA_1024).

impact: >
  The higher-bit level may result in slower performance, but reduces
  the likelihood of an attacker breaking the key.

  Encrypted data cannot be compressed, but compressed data can be
  encrypted. If you use compression, you should compress data before
  encrypting it.

check:
  # Iterates every user database; PASS iff no database has asymmetric
  # keys with key_length < 2048.
  type: sql_no_rows_match_per_database
  query: |
    SELECT db_name() AS Database_Name, name AS Key_Name
    FROM sys.asymmetric_keys
    WHERE key_length < 2048
    AND db_id() > 4;

remediation: |
  Refer to Microsoft SQL Server Books Online ALTER ASYMMETRIC KEY entry:
  https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-asymmetric-key-transact-sql

default_value: "None"

references:
  - https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-symmetric-key-transact-sql
  - https://learn.microsoft.com/en-US/sql/relational-databases/security/encryption/choose-an-encryption-algorithm

framework_mappings:
