id: "3.1"
title: "Ensure 'Server Authentication' Property is set to 'Windows Authentication Mode'"
section: "Authentication and Authorization"
assessment: automated
profile:
  - "Level 1 - Database Engine"
severity: HIGH

description: >
  Uses Windows Authentication to validate attempted connections.

rationale: >
  Windows provides a more robust authentication mechanism than SQL
  Server authentication.

impact: >
  Changing the login mode configuration requires a restart of the
  service.

check:
  type: sql_scalar
  query: |
    SELECT SERVERPROPERTY('IsIntegratedSecurityOnly') AS login_mode;
  assertions:
    - field: value
      op: equals
      value: 1

remediation: |
  -- T-SQL:
  USE [master]
  GO
  EXEC xp_instance_regwrite N'HKEY_LOCAL_MACHINE',
    N'Software\Microsoft\MSSQLServer\MSSQLServer', N'LoginMode', REG_DWORD, 1
  GO
  -- Restart the SQL Server service for the change to take effect.

default_value: "Windows Authentication Mode"

references:
  - https://learn.microsoft.com/en-us/sql/database-engine/configure-windows/server-properties-security-page

framework_mappings:
  cis_controls_v8:
    - id: "5.6"
      title: "Centralize Account Management"
  cis_controls_v7:
    - id: "16.2"
      title: "Configure Centralized Point of Authentication"
